description = "Explain Braid native Copilot CLI operation and troubleshooting"
prompt = "Explain concisely: `/braid:setup` checks the CLI and prints the next explicit project step; `/braid:status` reports adapter and Growth Mode state; `/braid:check` runs a read-only manual comparison; normal operation is automatic after explicit project initialization and Growth Mode enablement. Uninstall with `copilot plugin uninstall braid@braid`. Copilot CLI 1.0.71 has no working plugin enable/disable command. Do not claim Copilot cloud-agent support. Link to https://github.com/ting10688/Braid/blob/main/docs/native-agent-plugins.md and docs/growth-mode.md."
