name: Installer

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lifecycle:
    name: Lifecycle (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu x86_64
            runner: ubuntu-latest
          - name: macOS arm64
            runner: macos-15
          - name: macOS x86_64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check installer syntax
        run: sh -n install.sh uninstall.sh
      - run: pnpm distribution:build
      - run: pnpm distribution:verify
      - name: Run deterministic local lifecycle matrix
        run: pnpm test:installer
