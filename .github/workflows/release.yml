name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Verify tag and package versions
        env:
          TAG: ${{ github.ref_name }}
        run: |
          test "$(git rev-list -n 1 "$TAG")" = "$(git rev-parse HEAD)"
          VERSION="${TAG#v}"
          export VERSION
          node -e 'const fs=require("node:fs"); if (!/^v\d+\.\d+\.\d+$/.test(process.env.TAG)) throw new Error(`Tag must be stable semver: ${process.env.TAG}`); for (const file of ["package.json", "apps/cli/package.json", "packages/core/package.json"]) { const actual=JSON.parse(fs.readFileSync(file)).version; if (actual !== process.env.VERSION) throw new Error(`${file} is ${actual}, expected ${process.env.VERSION}`); }'
          printf 'VERSION=%s\n' "$VERSION" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: sh -n install.sh uninstall.sh
      - run: pnpm distribution:build
      - run: pnpm distribution:verify
      - name: Verify release checksums
        working-directory: .artifacts
        run: sha256sum -c SHA256SUMS
      - name: Validate tagged installer against local release fixture
        run: pnpm test:installer
      - name: Verify release assets
        run: |
          test -f ".artifacts/braid-v${VERSION}-demo-node22.tar.gz"
          test -f ".artifacts/braid-v${VERSION}-demo-node22.zip"
          test -f .artifacts/SHA256SUMS
          test -f install.sh
          test -f uninstall.sh
          git ls-files --error-unmatch install.sh uninstall.sh
      - name: Publish immutable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists; refusing to replace public assets"
            exit 1
          fi
          gh release create "$TAG" \
            ".artifacts/braid-${TAG}-demo-node22.tar.gz" \
            ".artifacts/braid-${TAG}-demo-node22.zip" \
            .artifacts/SHA256SUMS \
            install.sh \
            uninstall.sh \
            --verify-tag \
            --title "Braid ${TAG} — Reliable Installation" \
            --generate-notes
