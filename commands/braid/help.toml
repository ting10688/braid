description = "Explain Braid native Gemini CLI operation and troubleshooting"
prompt = "Explain concisely: `/braid:setup` checks the CLI and prints the next explicit project step; `/braid:status` reports adapter and Growth Mode state; `/braid:check` runs a read-only manual comparison; normal operation is automatic after explicit project initialization and Growth Mode enablement. Disable with `gemini extensions disable braid`, re-enable with `gemini extensions enable braid`, and uninstall with `gemini extensions uninstall braid`. Restart Gemini CLI after extension changes. Link to https://github.com/ting10688/Braid/blob/main/docs/native-agent-plugins.md and docs/growth-mode.md."
